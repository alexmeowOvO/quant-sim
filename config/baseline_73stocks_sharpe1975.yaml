data:
  days: 730
  interval: 1h
paper_trade:
  days: 60
strategy:
  trending_enabled: false
  ema:
    fast: 9
    slow: 20
  rsi:
    window: 14
    overbought: 70
    oversold: 30
  max_concurrent_positions: 8
execution:
  slippage_pct: 0.0005
  commission_per_trade: 10.0
portfolio:
  initial_capital: 100000.0
  position_size_pct: 0.1
risk:
  stop_loss_pct: 0.01
market_filter:
  ticker: ^AXJO
  sma_window: 50

tier_sweep:
  tier_a:
    bb_window: [10, 20]
    bb_std: [0.8, 1.0, 1.2, 1.5]
    vwap_threshold: [0.002, 0.003, 0.005]
    adx_threshold: [20, 25]
    trend_filter_window: [50, 100]
    atr_multiplier: [2.0, 2.5, 3.0, 3.5]
    max_hold_bars: [10, 14, 18]
  tier_b:
    bb_window: [10, 20]
    bb_std: [1.2, 1.5, 2.0]
    vwap_threshold: [0.005, 0.008, 0.01]
    adx_threshold: [20, 25]
    trend_filter_window: [50, 100]
    atr_multiplier: [3.5, 4.5, 5.5]
    max_hold_bars: [16, 20, 24]
